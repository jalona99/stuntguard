  cloud_firestore: ^4.0.0
  sqflite: ^2.0.0
  path_provider: ^2.0.0
  riverpod: ^2.0.0
  fl_chart: ^0.66.0
  http: ^1.0.0
  shared_preferences: ^2.0.0

dev_dependencies:
  flutter_test:
